{% extends 'base.html' %}
{% block content %}
<h1>Add Book</h1>
<div class="card">
  <form method="post">
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" required>
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" name="author" required>
    </div>
    <div class="form-group">
      <label>Copies</label>
      <input type="number" name="copies" min="1" value="1" required>
    </div>
    <div class="actions">
      <button class="btn" type="submit">Save</button>
      <a class="btn secondary" href="{{ url_for('admin_dashboard') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
