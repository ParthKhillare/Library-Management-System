{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <div class="auth-icon">📝</div>
            <h1 class="auth-title">Join Library</h1>
            <p class="auth-subtitle">Create your account to start borrowing books</p>
        </div>
        
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="name" class="form-label">
                    <span class="label-icon">👤</span>
                    Full Name
                </label>
                <input type="text" id="name" name="name" required 
                       class="form-input" placeholder="Enter your full name" autocomplete="name">
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">
                    <span class="label-icon">📧</span>
                    Email Address
                </label>
                <input type="email" id="email" name="email" required 
                       class="form-input" placeholder="Enter your email" autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">
                    <span class="label-icon">🔑</span>
                    Password
                </label>
                <input type="password" id="password" name="password" required 
                       class="form-input" placeholder="Create a strong password" autocomplete="new-password">
            </div>
            
            <div class="form-group">
                <label for="role" class="form-label">
                    <span class="label-icon">🎭</span>
                    Account Type
                </label>
                <select id="role" name="role" class="form-select">
                    <option value="User" selected>👤 Regular User - Browse and borrow books</option>
                    <option value="Admin">⚙️ Administrator - Manage library and books</option>
                </select>
            </div>
            
            <button type="submit" class="btn auth-btn">
                <span class="btn-icon">✨</span>
                Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p class="auth-text">
                Already have an account? 
                <a href="{{ url_for('login') }}" class="auth-link">
                    Login here
                </a>
            </p>
        </div>
    </div>
</div>

<style>
    .auth-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    
    .auth-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: var(--radius-lg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: var(--shadow-lg);
        padding: 3rem;
        width: 100%;
        max-width: 500px;
        position: relative;
        overflow: hidden;
    }
    
    .auth-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
        animation: float 8s ease-in-out infinite;
    }
    
    @keyframes float {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(-30px, -30px) rotate(-180deg); }
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
        position: relative;
        z-index: 1;
    }
    
    .auth-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        display: block;
    }
    
    .auth-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-color);
        margin-bottom: 0.5rem;
    }
    
    .auth-subtitle {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-bottom: 0;
    }
    
    .auth-form {
        position: relative;
        z-index: 1;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
        position: relative;
    }
    
    .form-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-color);
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .label-icon {
        font-size: 1rem;
    }
    
    .form-input {
        width: 100%;
        padding: 1rem 1rem 1rem 2.5rem;
        border: 2px solid var(--border-color);
        border-radius: var(--radius);
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        transition: var(--transition);
        color: var(--text-color);
        position: relative;
    }
    
    .form-input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background: rgba(255, 255, 255, 0.95);
        transform: translateY(-2px);
    }
    
    .form-select {
        width: 100%;
        padding: 1rem 1rem 1rem 2.5rem;
        border: 2px solid var(--border-color);
        border-radius: var(--radius);
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        transition: var(--transition);
        color: var(--text-color);
        position: relative;
        cursor: pointer;
    }
    
    .form-select:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background: rgba(255, 255, 255, 0.95);
        transform: translateY(-2px);
    }
    
    .auth-btn {
        width: 100%;
        padding: 1rem;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 1rem;
    }
    
    .auth-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: var(--transition);
    }
    
    .auth-btn:hover::before {
        left: 100%;
    }
    
    .auth-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        position: relative;
        z-index: 1;
    }
    
    .auth-text {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-bottom: 0;
    }
    
    .auth-link {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
    }
    
    .auth-link:hover {
        color: var(--primary-dark);
        text-decoration: underline;
    }
    
    @media (max-width: 768px) {
        .auth-container {
            padding: 1rem;
        }
        
        .auth-card {
            padding: 2rem;
            max-width: 100%;
        }
        
        .auth-title {
            font-size: 1.5rem;
        }
        
        .auth-icon {
            font-size: 2.5rem;
        }
    }
    
    @media (max-width: 480px) {
        .auth-card {
            padding: 1.5rem;
        }
        
        .auth-title {
            font-size: 1.25rem;
        }
        
        .auth-icon {
            font-size: 2rem;
        }
        
        .form-input,
        .form-select {
            padding: 0.875rem;
            font-size: 0.875rem;
        }
        
        .auth-btn {
            padding: 0.875rem;
            font-size: 0.875rem;
        }
    }
</style>
{% endblock %}
